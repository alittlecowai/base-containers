name: Build Multiple Images

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          [
            full-stack-ai-python,
            full-stack-ai-python-nosql,
            postgres,
            mongo-search,
            python-cplex,
            node-no-certs,
            cloudnative-postgres,
          ]

    steps:
      - uses: actions/checkout@v4

      - name: Set tag
        id: tag
        run: |
          if [ "${{ matrix.service }}" = "cloudnative-postgres" ]; then
            TAG="18-barman"
          else
            TAG=$(date -u +"%Y%m%d%H%M")
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
